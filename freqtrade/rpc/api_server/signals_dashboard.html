<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signals Dashboard | Freqtrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --header-bg: #11141b;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --long-color: #0ebd73;
            --short-color: #f6465d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        button:hover { background: rgba(255,255,255,0.1); }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            padding: 1rem 1.5rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            vertical-align: middle;
        }

        tbody tr:hover {
            background-color: rgba(255,255,255,0.02);
        }

        .coin-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
        }

        .leverage-badge {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 8px;
        }

        .type-long { color: var(--long-color); }
        .type-short { color: var(--short-color); }

        .val-primary { color: #fff; font-weight: 500; }
        .val-muted { color: var(--text-muted); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .status-failed   { color: #f6465d; }
        .status-waiting  { color: #f59e0b; }
        .status-skipped  { color: #94a3b8; }
        .status-ordered  { color: #3b82f6; }
        .status-closed-tp { color: #0ebd73; }
        .status-closed-sl { color: #f6465d; }
        .status-pending  { color: #f59e0b; }
        .status-sent     { color: #3b82f6; }

        .error-text {
            display: block;
            color: #fca5a5;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        #login-container {
            display: none;
            max-width: 400px;
            margin: 20vh auto;
            text-align: center;
            background: var(--header-bg);
            padding: 2rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }

        .settings-content {
            background: var(--header-bg);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            width: 300px;
        }

        .settings-content h3 { margin-top: 0; }
        
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.5rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .tf-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 4px 10px;
            font-size: 0.78rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .tf-btn:hover { border-color: var(--accent); color: #fff; }
        .tf-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

        /* Pagination styles */
        .pagination-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-right: 1rem;
        }
        .pagination-pages {
            display: flex;
            gap: 5px;
        }
        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            min-width: 32px;
            height: 32px;
            padding: 0 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .page-btn:hover:not(.disabled) {
            border-color: var(--accent);
            color: #fff;
        }
        .page-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .page-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        select.page-limit {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="login-container">
        <h2 style="margin-top: 0;">Access Denied</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Пожалуйста, сначала авторизуйтесь в Freqtrade UI.</p>
        <div style="text-align: left; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; font-size: 0.8rem; overflow-wrap: break-word; color: var(--text-muted);">
            <strong style="color: #fff">Debug Info:</strong><br>
            <span id="debug-info"></span>
        </div>
    </div>

    <div id="dashboard-container" style="display: none;">
        <header>
            <h1>Сигналы (Telegram)</h1>
            <div class="controls">
                <div class="pagination-container">
                    <select class="page-limit" id="page-limit" onchange="changeLimit()">
                        <option value="10">10 на стр.</option>
                        <option value="20">20 на стр.</option>
                        <option value="50">50 на стр.</option>
                        <option value="100">100 на стр.</option>
                    </select>
                    <div class="pagination-pages" id="pagination-pages">
                        <!-- Pages here -->
                    </div>
                </div>
                <span id="last-update">Обновление: --</span>
                <button onclick="openSettings()">Настройки</button>
            </div>
        </header>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Тикер</th>
                        <th>Тип</th>
                        <th>Плечо</th>
                        <th>Диапазон входа</th>
                        <th>Тейк-профит</th>
                        <th>Стоп-лосс</th>
                        <th>Время</th>
                        <th>Статус</th>
                        <th>График</th>
                    </tr>
                </thead>
                <tbody id="signals-body">
                    <!-- Data here -->
                </tbody>
            </table>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h3>Настройки Риска</h3>
            <div class="form-group">
                <label>Режим входа</label>
                <select id="set_stake_mode" onchange="toggleStakeMode()">
                    <option value="fixed">Фиксированная сумма</option>
                    <option value="percentage">% от депо</option>
                </select>
            </div>
            <div class="form-group" id="group_fixed">
                <label>Сумма ($)</label>
                <input type="number" id="set_stake_fixed_amount" value="10" step="1">
            </div>
            <div class="form-group" id="group_perc" style="display:none">
                <label>Процент (%)</label>
                <input type="number" id="set_stake_percentage" value="3" step="0.1">
            </div>
            <div class="form-group">
                <label>Плечо по умолчанию (если не указано)</label>
                <input type="number" id="set_default_leverage" value="50" step="1">
            </div>
            <div class="form-group">
                <label>Стратегия входа</label>
                <select id="set_entry_mode">
                    <option value="single">Один вход (Single)</option>
                    <option value="dca">Доборы (DCA)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Тип счета</label>
                <select id="set_exchange_mode">
                    <option value="dry_run">Имитация торговли (DRY RUN)</option>
                    <option value="vst">Виртуальная торговля (VST)</option>
                    <option value="live">Реальная торговля (USDT)</option>
                </select>
            </div>
            <button class="btn-primary" onclick="saveSettings()">Сохранить</button>
            <button onclick="closeSettings()" style="width: 100%; margin-top: 0.5rem; background: transparent; border: 1px solid var(--border-color); color: #fff;">Отмена</button>
        </div>
    </div>

    <div id="chart-modal" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column;">
        <div style="width: 90%; max-width: 1200px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden;">
            <div style="padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; gap: 1rem;">
                <h3 id="chart-title" style="margin: 0; white-space: nowrap;">Chart</h3>
                <div id="tf-buttons" style="display: flex; gap: 4px;">
                    <button class="tf-btn" data-tf="1m" onclick="changeTimeframe('1m')">1м</button>
                    <button class="tf-btn" data-tf="5m" onclick="changeTimeframe('5m')">5м</button>
                    <button class="tf-btn active" data-tf="15m" onclick="changeTimeframe('15m')">15м</button>
                    <button class="tf-btn" data-tf="1h" onclick="changeTimeframe('1h')">1ч</button>
                    <button class="tf-btn" data-tf="4h" onclick="changeTimeframe('4h')">4ч</button>
                    <button class="tf-btn" data-tf="1d" onclick="changeTimeframe('1d')">1д</button>
                    <button class="tf-btn" data-tf="1w" onclick="changeTimeframe('1w')">1н</button>
                    <button class="tf-btn" data-tf="1M" onclick="changeTimeframe('1M')">1М</button>
                </div>
                <button onclick="closeChart()" style="background: var(--short-color); border: none; white-space: nowrap;">Закрыть</button>
            </div>
            <div id="tvchart" style="width: 100%; height: 60vh;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        let pollInterval;
        let ftToken = '';
        let ftRefreshToken = '';
        let _refreshTimer = null;
        
        // Pagination state
        let currentPage = 1;
        let currentLimit = 10;
        let totalRecords = 0;

        // Silent re-login using HTTP Basic (same creds FreqUI stores in localStorage)
        async function silentLogin() {
            // Try to get credentials from FreqUI's Pinia store
            let username = '', password = '';
            try {
                // FreqUI stores in Pinia format
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const val = localStorage.getItem(key);
                    if (!val) continue;
                    try {
                        const parsed = JSON.parse(val);
                        // Pinia auth store
                        if (parsed && parsed.openAPIPassword) {
                            password = parsed.openAPIPassword;
                            username = parsed.username || 'freqtrade';
                        }
                        // Older vuex format
                        if (parsed && parsed.auth && parsed.auth.password) {
                            password = parsed.auth.password;
                            username = parsed.auth.username || 'freqtrade';
                        }
                    } catch (e) {}
                }
            } catch (e) {}

            if (!username || !password) {
                console.warn('silentLogin: no credentials found in localStorage');
                return false;
            }

            try {
                const res = await fetch('/api/v1/token/login', {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + btoa(username + ':' + password) }
                });
                if (res.ok) {
                    const data = await res.json();
                    ftToken = data.access_token;
                    ftRefreshToken = data.refresh_token || '';
                    scheduleTokenRefresh();
                    console.log('silentLogin: OK');
                    return true;
                }
            } catch (e) {
                console.error('silentLogin failed:', e);
            }
            return false;
        }

        // Proactive refresh every 13 min (token lives 15 min)
        function scheduleTokenRefresh() {
            if (_refreshTimer) clearInterval(_refreshTimer);
            _refreshTimer = setInterval(async () => {
                if (ftRefreshToken) {
                    try {
                        const res = await fetch('/api/v1/token/refresh', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${ftRefreshToken}` }
                        });
                        if (res.ok) {
                            const data = await res.json();
                            ftToken = data.access_token;
                            console.log('Token proactively refreshed');
                            return;
                        }
                    } catch (e) {}
                }
                // Refresh failed — fall back to full re-login
                await silentLogin();
            }, 13 * 60 * 1000); // 13 minutes
        }

        // Wrapper: auto-refresh token on 401 and retry once
        async function apiFetch(url, options = {}) {
            options.headers = { ...(options.headers || {}), 'Authorization': `Bearer ${ftToken}` };
            let res = await fetch(url, options);
            if (res.status === 401) {
                // Try refresh token first
                if (ftRefreshToken) {
                    const refreshRes = await fetch('/api/v1/token/refresh', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${ftRefreshToken}` }
                    });
                    if (refreshRes.ok) {
                        const refreshData = await refreshRes.json();
                        ftToken = refreshData.access_token;
                        scheduleTokenRefresh();
                        options.headers['Authorization'] = `Bearer ${ftToken}`;
                        res = await fetch(url, options);
                        if (res.ok) return res;
                    }
                }
                // Refresh failed or no refresh token — do full re-login
                const loginOk = await silentLogin();
                if (loginOk) {
                    options.headers['Authorization'] = `Bearer ${ftToken}`;
                    res = await fetch(url, options);
                }
            }
            return res;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Try to read existing token from FreqUI localStorage
            try {
                const authStr = localStorage.getItem('auth');
                if (authStr) {
                    const auth = JSON.parse(authStr);
                    if (auth && auth.token) ftToken = auth.token;
                    if (auth && auth.refresh_token) ftRefreshToken = auth.refresh_token;
                }
            } catch (e) {}

            if (!ftToken) {
                try {
                    // Pinia stores each module separately
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        const val = localStorage.getItem(key);
                        if (!val) continue;
                        try {
                            const parsed = JSON.parse(val);
                            if (parsed && parsed.accessToken) {
                                ftToken = parsed.accessToken;
                                ftRefreshToken = parsed.refreshToken || '';
                                break;
                            }
                            // Vuex fallback
                            if (parsed && parsed.auth) {
                                ftToken = parsed.auth.token || parsed.auth.access_token || '';
                                ftRefreshToken = parsed.auth.refresh_token || '';
                                if (ftToken) break;
                            }
                        } catch (e) {}
                    }
                } catch (e) {}
            }

            // 2. Brute-force: find any JWT in localStorage
            if (!ftToken) {
                for (let i = 0; i < localStorage.length; i++) {
                    const val = localStorage.getItem(localStorage.key(i));
                    if (val && typeof val === 'string' && val.startsWith('eyJ')) {
                        ftToken = val;
                        break;
                    }
                    if (val && typeof val === 'string' && val.includes('"eyJ')) {
                        const m = val.match(/"(eyJ[^"]+)"/);
                        if (m) { ftToken = m[1]; break; }
                    }
                }
            }

            // 3. No token at all — try silent login
            if (!ftToken) {
                await silentLogin();
            }

            if (ftToken) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'block';
                scheduleTokenRefresh();
                fetchSignals();
                pollInterval = setInterval(fetchSignals, 5000);
            } else {
                document.getElementById('debug-info').innerText = 'Не удалось авторизоваться. Откройте FreqUI и залогиньтесь.';
                document.getElementById('login-container').style.display = 'block';
            }
        });

        function logout() {
            document.getElementById('dashboard-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
            clearInterval(pollInterval);
        }

        function toggleStakeMode() {
            const mode = document.getElementById('set_stake_mode').value;
            document.getElementById('group_fixed').style.display = mode === 'fixed' ? 'block' : 'none';
            document.getElementById('group_perc').style.display = mode === 'percentage' ? 'block' : 'none';
        }

        async function openSettings() {
            try {
                const res = await apiFetch('/api/v1/signals_settings');
                const data = await res.json();
                if (!data.error) {
                    document.getElementById('set_stake_mode').value = data.stake_mode || 'fixed';
                    document.getElementById('set_stake_fixed_amount').value = data.stake_fixed_amount || 10;
                    document.getElementById('set_stake_percentage').value = data.stake_percentage || 3;
                    document.getElementById('set_default_leverage').value = data.default_leverage || 50;
                    document.getElementById('set_entry_mode').value = data.entry_mode || 'single';
                    document.getElementById('set_exchange_mode').value = data.exchange_mode || 'vst';
                    toggleStakeMode();
                }
            } catch (e) { console.error(e); }
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        async function saveSettings() {
            const payload = {
                stake_mode: document.getElementById('set_stake_mode').value,
                stake_fixed_amount: parseFloat(document.getElementById('set_stake_fixed_amount').value),
                stake_percentage: parseFloat(document.getElementById('set_stake_percentage').value),
                default_leverage: parseInt(document.getElementById('set_default_leverage').value),
                entry_mode: document.getElementById('set_entry_mode').value,
                exchange_mode: document.getElementById('set_exchange_mode').value
            };
            try {
                await apiFetch('/api/v1/signals_settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                closeSettings();
            } catch (e) { console.error(e); }
        }

        async function fetchSignals() {
            try {
                const offset = (currentPage - 1) * currentLimit;
                const res = await apiFetch(`/api/v1/signals?limit=${currentLimit}&offset=${offset}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const data = await res.json();
                if (data.signals && Array.isArray(data.signals)) {
                    totalRecords = data.total_count || 0;
                    renderTable(data.signals);
                    renderPagination();
                }
                
                const now = new Date();
                document.getElementById('last-update').innerText = `Обновление: ${now.toLocaleTimeString()}`;
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        function changeLimit() {
            currentLimit = parseInt(document.getElementById('page-limit').value);
            currentPage = 1;
            fetchSignals();
        }

        function goToPage(p) {
            currentPage = p;
            fetchSignals();
        }

        function renderPagination() {
            const container = document.getElementById('pagination-pages');
            const totalPages = Math.ceil(totalRecords / currentLimit);
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            
            // Logic for 1 2 3 ... 27
            const delta = 2;
            const range = [];
            for (let i = Math.max(2, currentPage - delta); i <= Math.min(totalPages - 1, currentPage + delta); i++) {
                range.push(i);
            }

            if (currentPage > delta + 2) html += `<div class="page-btn" onclick="goToPage(1)">1</div><div class="page-btn disabled">...</div>`;
            else if (totalPages > 1) html += `<div class="page-btn ${currentPage === 1 ? 'active' : ''}" onclick="goToPage(1)">1</div>`;

            range.forEach(i => {
                html += `<div class="page-btn ${currentPage === i ? 'active' : ''}" onclick="goToPage(${i})">${i}</div>`;
            });

            if (currentPage < totalPages - delta - 1) html += `<div class="page-btn disabled">...</div><div class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</div>`;
            else if (totalPages > 1 && !range.includes(totalPages)) html += `<div class="page-btn ${currentPage === totalPages ? 'active' : ''}" onclick="goToPage(${totalPages})">${totalPages}</div>`;

            container.innerHTML = html;
        }

        function parseSignalText(text) {
            let coin = "Unknown";
            let type = "LONG";
            let lev = "Cross";
            let entry = "--";
            let tp = "--";
            let sl = "--";

            if (!text) return { coin, type, lev, entry, tp, sl };

            if (text.includes('SHORT')) type = "SHORT";

            const lines = text.split(/\\n|\n/);
            for (const line of lines) {
                if (line.includes('Монета:')) coin = line.split('Монета:')[1].trim();
                if (line.includes('Плечо:')) lev = line.split('Плечо:')[1].trim();
                if (line.includes('Вход:')) entry = line.split('Вход:')[1].trim();
                if (line.includes('Цель:')) tp = line.split('Цель:')[1].trim();
                if (line.includes('Стоп:')) sl = line.split('Стоп:')[1].trim();
            }
            
            // Clean up to prevent SyntaxError in inline onclick handlers
            coin = coin.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            type = type.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            lev = lev.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            entry = entry.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            tp = tp.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            sl = sl.replace(/[\r\n]+/g, '').replace(/['"]/g, '');

            return { coin, type, lev, entry, tp, sl };
        }

        function getStatusHtml(status) {
            // Status map: status string -> class and label
            const map = {
                'failed':    ['status-failed',    '❌ failed'],
                'waiting':   ['status-waiting',   '⏳ waiting'],
                'skipped':   ['status-skipped',   '⏹ skipped'],
                'ordered':   ['status-ordered',   '🟦 ordered'],
                'sent':      ['status-ordered',   '🟦 ordered'], // 'sent' is what worker saves
                'closed_tp': ['status-closed-tp', '✅ closed (TP)'],
                'closed_sl': ['status-closed-sl', '❌ closed (SL)'],
                'pending':   ['status-pending',   '⏳ pending'],
                'parsed':    ['status-pending',   '⏳ waiting'],
            };
            const [cls, label] = map[status] || ['status-skipped', status];
            return `<span class="status-badge ${cls}">${label}</span>`;
        }

        function renderTable(signals) {
            const tbody = document.getElementById('signals-body');
            tbody.innerHTML = '';
            
            signals.forEach(sig => {
                const p = parseSignalText(sig.text);
                if (p.coin === "Unknown" || !p.coin) return;
                
                const tr = document.createElement('tr');
                
                let dStr = sig.created_at;
                if (!dStr.endsWith('Z')) dStr += 'Z';
                const d = new Date(dStr);
                const dateStr = !isNaN(d.getTime()) ? 
                    `${d.toLocaleDateString('ru-RU')} ${d.toLocaleTimeString('ru-RU')}` : 
                    sig.created_at;
                
                const typeClass = p.type === 'LONG' ? 'type-long' : 'type-short';

                tr.innerHTML = `
                    <td class="coin-name">${p.coin}</td>
                    <td class="${typeClass} val-primary">${p.type}</td>
                    <td class="val-muted">${p.lev}</td>
                    <td class="val-primary">${p.entry}</td>
                    <td style="color: #0ebd73;">${p.tp}</td>
                    <td style="color: #f6465d;">${p.sl}</td>
                    <td class="val-muted">${dateStr}</td>
                    <td>${getStatusHtml(sig.status)}</td>
                    <td><button onclick="openChart('${p.coin}', '${p.type}', '${p.entry}', '${p.tp}', '${p.sl}')">открыть</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        let chart;
        let lineSeries;
        let currentChartState = null; // { coin, type, entryStr, tp, sl, tf }

        async function openChart(coin, type, entryStr, tp, sl) {
            currentChartState = { coin, type, entryStr, tp, sl, tf: '15m' };
            _setActiveTfBtn('15m');
            document.getElementById('chart-title').innerText = `${coin}USDT - ${type}`;
            document.getElementById('chart-modal').style.display = 'flex';
            await _buildChart();
            await loadChartData();
        }

        function changeTimeframe(tf) {
            if (!currentChartState) return;
            currentChartState.tf = tf;
            _setActiveTfBtn(tf);
            loadChartData();
        }

        function _setActiveTfBtn(tf) {
            document.querySelectorAll('.tf-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.tf === tf);
            });
        }

        async function _buildChart() {
            const chartDom = document.getElementById('tvchart');
            chartDom.innerHTML = '';
            if (chart) { chart.remove(); chart = null; }
            await new Promise(r => setTimeout(r, 50));
            chart = LightweightCharts.createChart(chartDom, {
                width: chartDom.clientWidth,
                height: chartDom.clientHeight || 500,
                layout: { background: { type: 'solid', color: '#0b0e14' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { timeVisible: true, secondsVisible: false },
            });
            lineSeries = chart.addCandlestickSeries({
                upColor: '#0ebd73', downColor: '#f6465d',
                borderVisible: false, wickUpColor: '#0ebd73', wickDownColor: '#f6465d'
            });
        }

        async function loadChartData() {
            if (!currentChartState || !chart) return;
            const { coin, tp, sl, tf } = currentChartState;

            // Rebuild only candles (keep price lines fresh)
            lineSeries.setData([]);

            const MAX_RETRIES = 2;
            let lastErr = null;
            for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
                try {
                    const res = await apiFetch(`/api/v1/klines?symbol=${coin}/USDT:USDT&timeframe=${tf}&limit=200`);
                    const resJson = await res.json();

                    if (resJson.code === 0 && resJson.data && resJson.data.length > 0) {
                        lineSeries.setData(resJson.data);
                    } else {
                        console.error('klines error:', resJson);
                        if (attempt < MAX_RETRIES - 1) continue;
                    }

                    // Thin price lines — TP green, SL red
                    if (tp && tp !== '--') {
                        lineSeries.createPriceLine({ price: parseFloat(tp), color: '#0ebd73', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'TP' });
                    }
                    if (sl && sl !== '--') {
                        lineSeries.createPriceLine({ price: parseFloat(sl), color: '#f6465d', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'SL' });
                    }
                    return; // success
                } catch (err) {
                    lastErr = err;
                    console.warn(`klines attempt ${attempt + 1} failed:`, err);
                    await new Promise(r => setTimeout(r, 1000)); // wait 1s before retry
                }
            }
            console.error('Error loading chart data after retries:', lastErr);
        }

        function closeChart() {
            document.getElementById('chart-modal').style.display = 'none';
            if (chart) {
                chart.remove();
                chart = null;
            }
        }
    </script>
</body>
</html>
