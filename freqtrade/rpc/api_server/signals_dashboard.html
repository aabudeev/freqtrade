<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signals Dashboard | Freqtrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --header-bg: #11141b;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --long-color: #0ebd73;
            --short-color: #f6465d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        button:hover { background: rgba(255,255,255,0.1); }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            padding: 1rem 1.5rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            vertical-align: middle;
        }

        tbody tr:hover {
            background-color: rgba(255,255,255,0.02);
        }

        .coin-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
        }

        .leverage-badge {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 8px;
        }

        .type-long { color: var(--long-color); }
        .type-short { color: var(--short-color); }

        .val-primary { color: #fff; font-weight: 500; }
        .val-muted { color: var(--text-muted); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-pending .status-dot { background: #f59e0b; }
        .status-parsed .status-dot { background: #10b981; }
        .status-failed .status-dot { background: #ef4444; }
        .status-expired .status-dot { background: #64748b; }

        .error-text {
            display: block;
            color: #fca5a5;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        #login-container {
            display: none;
            max-width: 400px;
            margin: 20vh auto;
            text-align: center;
            background: var(--header-bg);
            padding: 2rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }

        .settings-content {
            background: var(--header-bg);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            width: 300px;
        }

        .settings-content h3 { margin-top: 0; }
        
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.5rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-primary:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <div id="login-container">
        <h2 style="margin-top: 0;">Access Denied</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Пожалуйста, сначала авторизуйтесь в Freqtrade UI.</p>
        <div style="text-align: left; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; font-size: 0.8rem; overflow-wrap: break-word; color: var(--text-muted);">
            <strong style="color: #fff">Debug Info:</strong><br>
            <span id="debug-info"></span>
        </div>
    </div>

    <div id="dashboard-container" style="display: none;">
        <header>
            <h1>Сигналы (Telegram)</h1>
            <div class="controls">
                <span id="last-update">Обновление: --</span>
                <button onclick="openSettings()">Настройки</button>
                <button onclick="logout()">Отключиться</button>
            </div>
        </header>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Тикер</th>
                        <th>Тип</th>
                        <th>Плечо</th>
                        <th>Диапазон входа</th>
                        <th>Тейк-профит</th>
                        <th>Стоп-лосс</th>
                        <th>Время</th>
                        <th>Статус</th>
                        <th>График</th>
                    </tr>
                </thead>
                <tbody id="signals-body">
                    <!-- Data here -->
                </tbody>
            </table>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h3>Настройки Риска</h3>
            <div class="form-group">
                <label>Режим входа</label>
                <select id="set_stake_mode" onchange="toggleStakeMode()">
                    <option value="fixed">Фиксированная сумма</option>
                    <option value="percentage">% от депо</option>
                </select>
            </div>
            <div class="form-group" id="group_fixed">
                <label>Сумма ($)</label>
                <input type="number" id="set_stake_fixed_amount" value="10" step="1">
            </div>
            <div class="form-group" id="group_perc" style="display:none">
                <label>Процент (%)</label>
                <input type="number" id="set_stake_percentage" value="3" step="0.1">
            </div>
            <div class="form-group">
                <label>Плечо по умолчанию (если не указано)</label>
                <input type="number" id="set_default_leverage" value="50" step="1">
            </div>
            <button class="btn-primary" onclick="saveSettings()">Сохранить</button>
            <button onclick="closeSettings()" style="width: 100%; margin-top: 0.5rem; background: transparent; border: 1px solid var(--border-color); color: #fff;">Отмена</button>
        </div>
    </div>

    <div id="chart-modal" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column;">
        <div style="width: 90%; max-width: 1200px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden;">
            <div style="padding: 1rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <h3 id="chart-title" style="margin: 0;">Chart</h3>
                <button onclick="closeChart()" style="background: var(--short-color); border: none;">Закрыть</button>
            </div>
            <div id="tvchart" style="width: 100%; height: 60vh;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        let pollInterval;
        let ftToken = '';

        document.addEventListener('DOMContentLoaded', () => {
            let debugMsg = "No token found.\nKeys: ";
            let keys = [];
            for (let i=0; i<localStorage.length; i++) keys.push(localStorage.key(i));
            debugMsg += keys.join(", ") + "\n";

            try {
                const authStr = localStorage.getItem('auth');
                if (authStr) {
                    const auth = JSON.parse(authStr);
                    if (auth && auth.token) ftToken = auth.token;
                }
            } catch (e) {}

            if (!ftToken) {
                try {
                    const vuexStr = localStorage.getItem('vuex');
                    if (vuexStr) {
                        const vuex = JSON.parse(vuexStr);
                        if (vuex && vuex.auth && vuex.auth.token) ftToken = vuex.auth.token;
                    }
                } catch (e) {}
            }

            if (!ftToken) ftToken = localStorage.getItem('jwt');
            if (!ftToken) ftToken = localStorage.getItem('token');

            if (!ftToken) {
                for(let i=0; i<localStorage.length; i++) {
                    const val = localStorage.getItem(localStorage.key(i));
                    if(val && typeof val === 'string' && val.startsWith('eyJ')) {
                        ftToken = val;
                        break;
                    }
                    if(val && typeof val === 'string' && val.includes('"eyJ')) {
                        const m = val.match(/"(eyJ[^"]+)"/);
                        if (m) { ftToken = m[1]; break; }
                    }
                }
            }

            if (ftToken) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'block';
                fetchSignals();
                pollInterval = setInterval(fetchSignals, 5000);
            } else {
                document.getElementById('debug-info').innerText = debugMsg;
                document.getElementById('login-container').style.display = 'block';
            }
        });

        function logout() {
            document.getElementById('dashboard-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
            clearInterval(pollInterval);
        }

        function toggleStakeMode() {
            const mode = document.getElementById('set_stake_mode').value;
            document.getElementById('group_fixed').style.display = mode === 'fixed' ? 'block' : 'none';
            document.getElementById('group_perc').style.display = mode === 'percentage' ? 'block' : 'none';
        }

        async function openSettings() {
            try {
                const res = await fetch('/api/v1/signals_settings', { headers: { 'Authorization': `Bearer ${ftToken}` } });
                const data = await res.json();
                if (!data.error) {
                    document.getElementById('set_stake_mode').value = data.stake_mode || 'fixed';
                    document.getElementById('set_stake_fixed_amount').value = data.stake_fixed_amount || 10;
                    document.getElementById('set_stake_percentage').value = data.stake_percentage || 3;
                    document.getElementById('set_default_leverage').value = data.default_leverage || 50;
                    toggleStakeMode();
                }
            } catch (e) { console.error(e); }
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        async function saveSettings() {
            const payload = {
                stake_mode: document.getElementById('set_stake_mode').value,
                stake_fixed_amount: parseFloat(document.getElementById('set_stake_fixed_amount').value),
                stake_percentage: parseFloat(document.getElementById('set_stake_percentage').value),
                default_leverage: parseInt(document.getElementById('set_default_leverage').value)
            };
            try {
                await fetch('/api/v1/signals_settings', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${ftToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                closeSettings();
            } catch (e) { console.error(e); }
        }

        async function fetchSignals() {
            try {
                const res = await fetch('/api/v1/signals', {
                    headers: { 'Authorization': `Bearer ${ftToken}` }
                });
                
                if (res.status === 401) {
                    document.getElementById('debug-info').innerText += "\nAPI returned 401 Unauthorized!";
                    logout();
                    return;
                }
                
                const data = await res.json();
                if (data.signals && Array.isArray(data.signals)) {
                    renderTable(data.signals);
                } else {
                    renderTable(data);
                }
                
                const now = new Date();
                document.getElementById('last-update').innerText = `Обновление: ${now.toLocaleTimeString()}`;
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        function parseSignalText(text) {
            let coin = "Unknown";
            let type = "LONG";
            let lev = "Cross";
            let entry = "--";
            let tp = "--";
            let sl = "--";

            if (!text) return { coin, type, lev, entry, tp, sl };

            if (text.includes('SHORT')) type = "SHORT";

            const lines = text.split(/\\n|\n/);
            for (const line of lines) {
                if (line.includes('Монета:')) coin = line.split('Монета:')[1].trim();
                if (line.includes('Плечо:')) lev = line.split('Плечо:')[1].trim();
                if (line.includes('Вход:')) entry = line.split('Вход:')[1].trim();
                if (line.includes('Цель:')) tp = line.split('Цель:')[1].trim();
                if (line.includes('Стоп:')) sl = line.split('Стоп:')[1].trim();
            }
            
            // Clean up to prevent SyntaxError in inline onclick handlers
            coin = coin.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            type = type.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            lev = lev.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            entry = entry.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            tp = tp.replace(/[\r\n]+/g, '').replace(/['"]/g, '');
            sl = sl.replace(/[\r\n]+/g, '').replace(/['"]/g, '');

            return { coin, type, lev, entry, tp, sl };
        }

        function renderTable(signals) {
            const tbody = document.getElementById('signals-body');
            tbody.innerHTML = '';
            
            signals.forEach(sig => {
                const p = parseSignalText(sig.text);
                if (p.coin === "Unknown" || !p.coin) return; // Skip non-entry or unknown signals
                
                const tr = document.createElement('tr');
                
                // Fix invalid date
                let dStr = sig.created_at;
                if (!dStr.endsWith('Z')) dStr += 'Z';
                const d = new Date(dStr);
                const dateStr = !isNaN(d.getTime()) ? 
                    `${d.toLocaleDateString('ru-RU')} ${d.toLocaleTimeString('ru-RU')}` : 
                    sig.created_at;
                
                let statusClass = 'status-pending';
                if (sig.status === 'parsed') statusClass = 'status-parsed';
                else if (sig.status === 'failed') statusClass = 'status-failed';
                else if (sig.status === 'expired') statusClass = 'status-expired';
                
                const typeClass = p.type === 'LONG' ? 'type-long' : 'type-short';

                tr.innerHTML = `
                    <td class="coin-name">${p.coin}</td>
                    <td class="${typeClass} val-primary">${p.type}</td>
                    <td class="val-muted">${p.lev}</td>
                    <td class="val-primary">${p.entry}</td>
                    <td style="color: #0ebd73;">${p.tp}</td>
                    <td style="color: #f6465d;">${p.sl}</td>
                    <td class="val-muted">${dateStr}</td>
                    <td>
                        <div class="status-badge ${statusClass}">
                            <span style="color: var(--text-main); font-size: 0.8rem;">${sig.status}</span>
                        </div>
                    </td>
                    <td>
                        <button onclick="openChart('${p.coin}', '${p.type}', '${p.entry}', '${p.tp}', '${p.sl}')">[открыть]</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        let chart;
        let lineSeries;

        async function openChart(coin, type, entryStr, tp, sl) {
            document.getElementById('chart-title').innerText = `${coin}USDT - ${type}`;
            document.getElementById('chart-modal').style.display = 'flex';
            
            const chartDom = document.getElementById('tvchart');
            chartDom.innerHTML = ''; // clear old chart
            
            chart = LightweightCharts.createChart(chartDom, {
                width: chartDom.clientWidth,
                height: chartDom.clientHeight,
                layout: {
                    background: { type: 'solid', color: '#0b0e14' },
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: '#1e293b' },
                    horzLines: { color: '#1e293b' },
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { timeVisible: true, secondsVisible: false },
            });
            
            lineSeries = chart.addCandlestickSeries({
                upColor: '#0ebd73',
                downColor: '#f6465d',
                borderVisible: false,
                wickUpColor: '#0ebd73',
                wickDownColor: '#f6465d'
            });

            try {
                const res = await fetch(`https://open-api.bingx.com/openApi/swap/v2/quote/klines?symbol=${coin}-USDT&interval=15m&limit=100`);
                const resJson = await res.json();
                
                if (resJson.code === 0 && resJson.data) {
                    const chartData = resJson.data.map(d => ({
                        time: d.time / 1000,
                        open: parseFloat(d.open),
                        high: parseFloat(d.high),
                        low: parseFloat(d.low),
                        close: parseFloat(d.close)
                    }));
                    lineSeries.setData(chartData);
                } else {
                    console.error('BingX API failed or returned empty data', resJson);
                }
                
                // Add price lines
                if (tp && tp !== '--') {
                    lineSeries.createPriceLine({
                        price: parseFloat(tp),
                        color: '#0ebd73',
                        lineWidth: 2,
                        lineStyle: LightweightCharts.LineStyle.Dashed,
                        axisLabelVisible: true,
                        title: 'TP',
                    });
                }
                if (sl && sl !== '--') {
                    lineSeries.createPriceLine({
                        price: parseFloat(sl),
                        color: '#f6465d',
                        lineWidth: 2,
                        lineStyle: LightweightCharts.LineStyle.Dashed,
                        axisLabelVisible: true,
                        title: 'SL',
                    });
                }
                
                // parse entry range
                if (entryStr && entryStr !== '--') {
                    const entries = entryStr.match(/[0-9.]+/g);
                    if (entries && entries.length > 0) {
                        lineSeries.createPriceLine({
                            price: parseFloat(entries[0]),
                            color: '#3b82f6',
                            lineWidth: 2,
                            lineStyle: LightweightCharts.LineStyle.Solid,
                            axisLabelVisible: true,
                            title: 'Entry 1',
                        });
                        if (entries.length > 1) {
                            lineSeries.createPriceLine({
                                price: parseFloat(entries[1]),
                                color: '#3b82f6',
                                lineWidth: 2,
                                lineStyle: LightweightCharts.LineStyle.Solid,
                                axisLabelVisible: true,
                                title: 'Entry 2',
                            });
                        }
                    }
                }
            } catch (err) {
                console.error('Error fetching Binance klines', err);
            }
        }

        function closeChart() {
            document.getElementById('chart-modal').style.display = 'none';
            if (chart) {
                chart.remove();
                chart = null;
            }
        }
    </script>
</body>
</html>
