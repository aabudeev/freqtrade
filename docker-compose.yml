---
services:
  freqtrade:
    build:
      context: .
      dockerfile: docker/Dockerfile.socks
    image: freqtrade-local:stable-socks
    restart: unless-stopped
    container_name: freqtrade
    entrypoint: ["/bin/bash", "/freqtrade/fork/scripts/signals/run_freqtrade_with_auth.sh"]
    environment:
      - HTTP_PROXY=${TG_PROXY:-}
      - HTTPS_PROXY=${TG_PROXY:-}
      - TG_PROXY=${TG_PROXY:-}
      - FREQTRADE__TELEGRAM__TOKEN=${TELEGRAM_TOKEN}
      - FREQTRADE__TELEGRAM__CHAT_ID=${TELEGRAM_CHAT_ID}
      - FREQTRADE__EXCHANGE__KEY=${EXCHANGE_KEY}
      - FREQTRADE__EXCHANGE__SECRET=${EXCHANGE_SECRET}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-}
      - TELEGRAM_SESSION_PATH=${TELEGRAM_SESSION_PATH:-user_data/.secrets/telegram_signals.session}
      - TELEGRAM_2FA_PASSWORD=${TELEGRAM_2FA_PASSWORD:-}
      - ENABLE_TELEGRAM_SIGNAL_AUTH=${ENABLE_TELEGRAM_SIGNAL_AUTH:-0}
      - TELEGRAM_SIGNALS_CHANNEL_ID=${TELEGRAM_SIGNALS_CHANNEL_ID:-}
      - SKIP_TELEGRAM_CHANNEL_SMOKE=${SKIP_TELEGRAM_CHANNEL_SMOKE:-0}
      - TELEGRAM_CHANNEL_SMOKE_LIMIT=${TELEGRAM_CHANNEL_SMOKE_LIMIT:-20}
      - TELEGRAM_CHANNEL_SMOKE_MIN_EXPECTED=${TELEGRAM_CHANNEL_SMOKE_MIN_EXPECTED:-10}
      - ENABLE_TELEGRAM_SIGNALS_LISTENER=${ENABLE_TELEGRAM_SIGNALS_LISTENER:-1}
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "8080:8080"
    command:
      - trade
      - --db-url
      - sqlite:////freqtrade/user_data/tradesv3.sqlite
      - --config
      - /freqtrade/user_data/config.json
      - --strategy
      - SignalOnlyStrategy
    networks:
      - shared_network

networks:
  shared_network:
    external: true